@if (initiative) {
  <h1>Iniciativa</h1>

  <p-card>
    <form [formGroup]="form" (ngSubmit)="save()" class="formgrid grid">
      <div class="field col-12">
        <label>Título *</label>
        <input pInputText formControlName="title" class="w-full" />
      </div>
      <div class="field col-12">
        <label>Solución propuesta</label>
        <textarea pInputTextarea formControlName="proposedSolution" rows="3" class="w-full"></textarea>
      </div>
      <div class="field col-12 md:col-4">
        <label>Reducción esperada (%)</label>
        <p-inputNumber formControlName="expectedReductionPercent" [min]="0" [max]="100" styleClass="w-full" />
      </div>
      <div class="field col-12 md:col-4">
        <label>Complejidad</label>
        <p-dropdown [options]="complexities" optionLabel="label" optionValue="value" formControlName="complexity" styleClass="w-full" />
      </div>
      <div class="field col-12 md:col-4">
        <label>Prioridad</label>
        <p-dropdown [options]="priorities" optionLabel="label" optionValue="value" formControlName="priority" styleClass="w-full" />
      </div>
      <div class="field col-12 md:col-4">
        <label>Estado</label>
        <p-dropdown [options]="statuses" optionLabel="label" optionValue="value" formControlName="status" styleClass="w-full" />
      </div>

      <div class="col-12 flex gap-2 justify-content-end mt-2">
        <a pButton [routerLink]="['/frictions', initiative.frictionId]" label="Ver fricción" class="p-button-text"></a>
        <button pButton type="submit" [loading]="saving" icon="pi pi-check" label="Guardar cambios"></button>
      </div>
    </form>
  </p-card>

  <a routerLink="/initiatives" class="inline-block mt-3"><i class="pi pi-arrow-left"></i> Volver a iniciativas</a>
}
